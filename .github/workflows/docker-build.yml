name: Docker Build & Push

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "go.mod"
      - "go.sum"
      - "**.go"
      - "web/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Build target (frps or frpc)"
        required: true
        default: "frps"
        type: choice
        options:
          - frps
          - frpc

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set lowercase image name
        run: echo "IMAGE_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate short SHA tag
        id: sha
        run: echo "SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set build target
        id: target
        run: |
          TARGET="${{ inputs.target || 'frps' }}"
          echo "BUILD_TARGET=${TARGET}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            TARGET=${{ env.BUILD_TARGET }}
          tags: |
            ${{ env.IMAGE_LOWER }}:latest
            ${{ env.IMAGE_LOWER }}:${{ env.SHA_SHORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
