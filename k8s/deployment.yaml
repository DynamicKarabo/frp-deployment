apiVersion: v1
kind: Namespace
metadata:
  name: frp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frps-config
  namespace: frp
data:
  frps.toml: |
    bind_port = 7000
    bind_addr = "0.0.0.0"
    dashboard_port = 7500
    dashboard_user = "admin"
    dashboard_pwd = "admin"
    log_file = "/dev/stdout"
    log_level = "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frps
  namespace: frp
  labels:
    app: frps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frps
  template:
    metadata:
      labels:
        app: frps
    spec:
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      imagePullSecrets:
      - name: ghcr-auth
      containers:
      - name: frps
        image: ghcr.io/dynamickarabo/frp-deployment:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7000
          name: control
        - containerPort: 7500
          name: dashboard
        volumeMounts:
        - name: config
          mountPath: /app/config
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: frps-config
---
apiVersion: v1
kind: Service
metadata:
  name: frps
  namespace: frp
spec:
  type: NodePort
  selector:
    app: frps
  ports:
  - port: 7000
    targetPort: 7000
    nodePort: 30700
    name: control
  - port: 7500
    targetPort: 7500
    nodePort: 30750
    name: dashboard
